server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip the text payloads — shaders & JS bundles compress extremely well.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # MediaPipe ships .wasm and protobuf .data/.binarypb blobs that must be
    # served with the correct MIME type or the runtime refuses to instantiate.
    types {
        application/wasm                wasm;
        application/octet-stream        data binarypb tflite;
    }

    # Long-cache fingerprinted assets, never-cache the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /mediapipe/ {
        add_header Cross-Origin-Resource-Policy "same-origin";
        expires 7d;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — every unknown route resolves to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hardening headers. COOP/COEP keep us eligible for cross-origin isolation
    # should we later move to threaded WASM SIMD.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self)" always;
}
