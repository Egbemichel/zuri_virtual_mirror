<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1614" />
    <title>Zuri — Virtual Mirror</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- MediaPipe Face Mesh via global CDN scripts; WASM served locally. -->
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div id="app">
      <!-- ── Full-screen camera stage (the hero) ── -->
      <section class="stage" id="stage" data-mode="loading">
        <video id="input_video" playsinline autoplay muted></video>
        <canvas id="output_canvas"></canvas>
        <div class="stage__vignette" aria-hidden="true"></div>

        <!-- Top HUD: brand + lighting coach -->
        <header class="hud hud--top">
          <div class="brand">
            <svg class="brand__mark" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M3 12c4-5 7-5 9-2 2-3 5-3 9 2-4 5-7 5-9 2-2 3-5 3-9-2Z"
                fill="currentColor"
              />
            </svg>
            <span class="brand__word">Zuri</span>
          </div>
          <div class="stage__status" id="status" role="status" aria-live="polite">
            <span class="stage__dot" aria-hidden="true"></span>
            <span id="status_text">Preparing your mirror…</span>
          </div>
        </header>

        <!-- Bottom dock: shade rail + actions -->
        <div class="dock" id="dock">
          <p class="rail__name" id="rail_name"></p>
          <div class="rail" id="rail" role="radiogroup" aria-label="Lip shades"></div>
          <div class="dock__bar">
            <button
              type="button"
              class="iconbtn"
              id="sheet_toggle"
              aria-label="Create a custom shade"
              aria-expanded="false"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 5v14M5 12h14"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
            <div class="controls" id="controls"></div>
            <span class="iconbtn iconbtn--spacer" aria-hidden="true"></span>
          </div>
        </div>

        <!-- Slide-up sheet: "extra stuff" (custom studio + brand info) -->
        <aside class="sheet" id="sheet" aria-hidden="true">
          <button class="sheet__scrim" id="sheet_scrim" aria-label="Close panel"></button>
          <div class="sheet__card">
            <div class="sheet__handle" aria-hidden="true"></div>
            <div id="panel"></div>
          </div>
        </aside>

        <!-- Minimal loading overlay -->
        <div class="loader" id="loader">
          <svg class="loader__mark" viewBox="0 0 120 70" aria-hidden="true">
            <path
              class="loader__path"
              d="M8 35 C30 12 50 12 60 27 C70 12 90 12 112 35"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
            />
            <path
              class="loader__path"
              d="M8 35 C40 62 80 62 112 35"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
            />
          </svg>
          <span class="loader__label" id="loader_label">Preparing your mirror…</span>
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
